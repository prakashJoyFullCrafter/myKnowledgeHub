<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
<style>
    .box { fill: white; stroke: black; stroke-width: 2; }
    .text { font-family: Arial; font-size: 12px; }
    .arrow { stroke: black; stroke-width: 2; marker-end: url(#arrowhead); }
    .dashed { stroke-dasharray: 6,4; }
</style>

<defs>
  <marker id="arrowhead" markerWidth="10" markerHeight="7" 
  refX="10" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" />
  </marker>
</defs>

<!-- Boxes -->
<rect x="50" y="300" width="150" height="60" class="box"/>
<text x="75" y="335" class="text">Client</text>

<rect x="250" y="200" width="150" height="60" class="box"/>
<text x="270" y="235" class="text">App Server</text>

<rect x="250" y="400" width="150" height="60" class="box"/>
<text x="265" y="435" class="text">CloudFront CDN</text>

<rect x="500" y="300" width="180" height="80" class="box"/>
<text x="540" y="335" class="text">S3 Bucket</text>
<text x="520" y="355" class="text">(Object Storage)</text>

<rect x="750" y="200" width="180" height="60" class="box"/>
<text x="770" y="235" class="text">Lambda Processing</text>

<rect x="750" y="400" width="180" height="60" class="box"/>
<text x="790" y="435" class="text">Data Lake / Athena</text>

<rect x="950" y="300" width="150" height="60" class="box"/>
<text x="975" y="335" class="text">Backup / Glacier</text>

<!-- Arrows -->
<line x1="200" y1="330" x2="250" y2="230" class="arrow"/>
<text x="210" y="260" class="text">Request URL</text>

<line x1="200" y1="330" x2="500" y2="340" class="arrow"/>
<text x="300" y="320" class="text">Upload (Presigned)</text>

<line x1="400" y1="430" x2="500" y2="360" class="arrow"/>
<text x="410" y="380" class="text">Fetch via CDN</text>

<line x1="680" y1="320" x2="750" y2="230" class="arrow"/>
<text x="690" y="260" class="text">Event Trigger</text>

<line x1="680" y1="360" x2="750" y2="430" class="arrow"/>
<text x="690" y="410" class="text">Query</text>

<line x1="680" y1="340" x2="950" y2="330" class="arrow"/>
<text x="800" y="315" class="text">Lifecycle → Archive</text>

<!-- Failure / Recovery -->
<line x1="500" y1="380" x2="500" y2="500" class="arrow dashed"/>
<text x="510" y="450" class="text">Replication / Recovery</text>

<!-- Legend -->
<rect x="50" y="600" width="400" height="150" class="box"/>
<text x="60" y="620" class="text">Legend:</text>
<text x="60" y="640" class="text">Solid arrows = data flow</text>
<text x="60" y="660" class="text">Dashed arrows = failure/recovery</text>
<text x="60" y="680" class="text">Boxes = system components</text>

</svg>
