<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box { fill: white; stroke: black; stroke-width: 2; }
    .text { font-family: Arial, sans-serif; font-size: 12px; }
    .arrow { stroke: black; stroke-width: 1.5; marker-end: url(#arrowhead); }
    .dashed { stroke-dasharray: 5,5; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black" />
    </marker>
  </defs>

  <!-- Client -->
  <rect x="50" y="350" width="120" height="50" class="box"/>
  <text x="60" y="380" class="text">Client</text>

  <!-- API Gateway -->
  <rect x="220" y="350" width="150" height="50" class="box"/>
  <text x="235" y="380" class="text">API Gateway</text>

  <!-- Services -->
  <rect x="450" y="150" width="150" height="50" class="box"/>
  <text x="455" y="180" class="text">Order Service</text>

  <rect x="450" y="300" width="150" height="50" class="box"/>
  <text x="455" y="330" class="text">Catalog Service</text>

  <rect x="450" y="450" width="150" height="50" class="box"/>
  <text x="455" y="480" class="text">Payment Service</text>

  <!-- Databases -->
  <rect x="700" y="150" width="150" height="50" class="box"/>
  <text x="705" y="180" class="text">Order DB</text>

  <rect x="700" y="300" width="150" height="50" class="box"/>
  <text x="705" y="330" class="text">Catalog DB</text>

  <rect x="700" y="450" width="150" height="50" class="box"/>
  <text x="705" y="480" class="text">Payment DB</text>

  <!-- Message Broker -->
  <rect x="450" y="600" width="200" height="50" class="box"/>
  <text x="460" y="630" class="text">Event Bus / Broker</text>

  <!-- Arrows -->
  <line x1="170" y1="375" x2="220" y2="375" class="arrow"/>
  <text x="175" y="360" class="text">HTTP Request</text>

  <line x1="370" y1="375" x2="450" y2="175" class="arrow"/>
  <text x="360" y="260" class="text">Route</text>

  <line x1="370" y1="375" x2="450" y2="325" class="arrow"/>
  <line x1="370" y1="375" x2="450" y2="475" class="arrow"/>

  <line x1="600" y1="175" x2="700" y2="175" class="arrow"/>
  <line x1="600" y1="325" x2="700" y2="325" class="arrow"/>
  <line x1="600" y1="475" x2="700" y2="475" class="arrow"/>

  <!-- Events -->
  <line x1="525" y1="200" x2="525" y2="600" class="arrow"/>
  <line x1="525" y1="350" x2="525" y2="600" class="arrow"/>
  <line x1="525" y1="500" x2="525" y2="600" class="arrow"/>
  <text x="530" y="550" class="text">Events</text>

  <!-- Failure dashed -->
  <line x1="450" y1="150" x2="220" y2="350" class="arrow dashed"/>
  <text x="300" y="200" class="text">Fallback / Retry</text>

  <!-- Legend -->
  <rect x="900" y="100" width="250" height="200" class="box"/>
  <text x="910" y="120" class="text">Legend:</text>
  <text x="910" y="140" class="text">Solid Arrow: Sync Call</text>
  <text x="910" y="160" class="text">Vertical Arrow: Event Flow</text>
  <text x="910" y="180" class="text">Dashed Arrow: Failure Path</text>
  <text x="910" y="200" class="text">Each service owns its DB</text>
  <text x="910" y="220" class="text">Services scale independently</text>

</svg>
